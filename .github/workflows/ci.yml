name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

# Restrict default GITHUB_TOKEN permissions to read-only.
# Jobs that need more (e.g. pull-requests: write for coverage reports)
# escalate per-job below.
permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch to free up runners
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Node.js jobs — run on GitHub-hosted runners (free for public repos)
  # No setup job needed: each runner is ephemeral with clean state.
  # All Node.js jobs run fully in parallel with no serial bottleneck.
  # ============================================================================

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Clean ReScript build cache
        run: yarn rescript clean

      - name: Build project
        run: make build

  test-frontman-client:
    name: Test frontman-client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/frontman-client test-coverage

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: libs/frontman-client/coverage/cobertura-coverage.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

  test-frontman-core:
    name: Test frontman-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/frontman-core test-coverage

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: libs/frontman-core/coverage/cobertura-coverage.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

  test-frontman-nextjs:
    name: Test frontman-nextjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/frontman-nextjs test-coverage

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: libs/frontman-nextjs/coverage/cobertura-coverage.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

  test-react-statestore:
    name: Test react-statestore
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/react-statestore test-coverage

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: libs/react-statestore/coverage/cobertura-coverage.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

  test-client:
    name: Test client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: make -C libs/client test-coverage

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: libs/client/coverage/cobertura-coverage.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

  lint-client:
    name: Lint libs/client
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changes in libs/client
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            client:
              - 'libs/client/**'

      - name: Setup Node.js
        if: steps.changes.outputs.client == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        if: steps.changes.outputs.client == 'true'
        run: corepack enable && corepack install

      - name: Cache dependencies
        if: steps.changes.outputs.client == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        if: steps.changes.outputs.client == 'true'
        run: yarn install --immutable

      - name: Run biome lint
        if: steps.changes.outputs.client == 'true'
        run: cd libs/client && npx biome lint .

  protocol-check:
    name: Protocol schema check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for changes in libs/frontman-protocol
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            protocol:
              - 'libs/frontman-protocol/**'

      - name: Setup Node.js
        if: steps.changes.outputs.protocol == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        if: steps.changes.outputs.protocol == 'true'
        run: corepack enable && corepack install

      - name: Cache dependencies
        if: steps.changes.outputs.protocol == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        if: steps.changes.outputs.protocol == 'true'
        run: yarn install --immutable

      - name: Build project
        if: steps.changes.outputs.protocol == 'true'
        run: make build

      - name: Check schemas are up to date
        if: steps.changes.outputs.protocol == 'true'
        run: make -C libs/frontman-protocol check-schemas

      - name: Fetch main branch for diff
        if: steps.changes.outputs.protocol == 'true'
        run: git fetch origin main

      - name: Check for breaking changes
        if: steps.changes.outputs.protocol == 'true'
        run: node libs/frontman-protocol/scripts/CheckBreakingChanges.res.mjs

  dead-code:
    name: Dead code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build ReScript
        run: yarn rescript clean && yarn rescript

      - name: Check for dead code
        run: |
          output=$(make reanalyze 2>&1 || true)
          echo "$output"
          if ! echo "$output" | grep -q "Analysis reported 0 issues"; then
            echo "::error::Dead code detected. Please remove unused code."
            exit 1
          fi
          echo "No dead code found."

  check-marketing-links:
    name: Check marketing broken links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build ReScript packages
        run: yarn rescript

      - name: Bundle astro integration
        run: yarn build:bundle
        working-directory: libs/frontman-astro

      - name: Build marketing site (fails on broken links)
        run: cd apps/marketing && yarn build

  # ============================================================================
  # Elixir jobs — stay on self-hosted runners (need PostgreSQL on Docker host,
  # cached mise/Erlang/Elixir toolchain)
  #
  # lint and dialyzer no longer depend on test-frontman-server — they run in
  # parallel for faster feedback.
  # ============================================================================

  test-swarm-ai:
    name: Test swarm_ai
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libssl-dev libncurses5-dev

      - name: Fix mise binary permissions
        run: chmod -R +x ~/.local/share/mise/bin/ 2>/dev/null || true

      # Uses mise.toml as single source of truth for Erlang/Elixir versions
      - name: Setup Erlang/Elixir via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Hex/Rebar
        run: make setup-elixir-tools

      - name: Cache deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/swarm_ai/deps
          key: ${{ runner.os }}-swarm-mix-${{ hashFiles('apps/swarm_ai/mix.lock') }}
          restore-keys: ${{ runner.os }}-swarm-mix-

      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/swarm_ai/_build
          key: ${{ runner.os }}-swarm-build-test-${{ hashFiles('apps/swarm_ai/mix.lock') }}
          restore-keys: ${{ runner.os }}-swarm-build-test-

      - name: Install dependencies
        working-directory: apps/swarm_ai
        run: mix deps.get

      - name: Run tests
        working-directory: apps/swarm_ai
        run: mix test

      - name: Validate Hex package
        working-directory: apps/swarm_ai
        run: mix hex.build --unpack

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf apps/swarm_ai/_build apps/swarm_ai/deps


  test-frontman-server:
    name: Test frontman-server
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Resolve Docker host gateway IP for PostgreSQL
        # The self-hosted runner runs inside a Docker container.
        # PostgreSQL runs on the Docker host, so we need the gateway IP.
        run: |
          # Try multiple methods to find the Docker host gateway
          if command -v ip &>/dev/null; then
            DB_HOST=$(ip route | awk '/default/ { print $3 }')
          fi
          if [ -z "$DB_HOST" ] && [ -f /proc/net/route ]; then
            # Parse gateway from /proc/net/route (hex-encoded, little-endian)
            HEX=$(awk '$2 == "00000000" { print $3; exit }' /proc/net/route)
            if [ -n "$HEX" ]; then
              DB_HOST=$(printf '%d.%d.%d.%d' 0x${HEX:6:2} 0x${HEX:4:2} 0x${HEX:2:2} 0x${HEX:0:2})
            fi
          fi
          if [ -z "$DB_HOST" ]; then
            # Last resort: typical Docker bridge gateway
            DB_HOST="172.17.0.1"
          fi
          echo "DB_HOST=${DB_HOST}" >> "$GITHUB_ENV"
          echo "Resolved DB_HOST=${DB_HOST}"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libssl-dev libncurses5-dev

      - name: Fix mise binary permissions
        run: chmod -R +x ~/.local/share/mise/bin/ 2>/dev/null || true

      # Uses mise.toml as single source of truth for Erlang/Elixir versions
      - name: Setup Erlang/Elixir via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Verify toolchain pins
        run: make verify-toolchain-pins

      - name: Install Hex/Rebar
        run: make setup-elixir-tools

      - name: Cache deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      # test job compiles with MIX_ENV=test (code_reloader: false) — use
      # separate cache key so dev-env jobs (lint, dialyzer) don't restore
      # stale _build/dev artifacts with the wrong compile-time config.
      # v2: bust stale caches after E2E cache key split (build-e2e- vs build-dev-)
      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/_build
          key: ${{ runner.os }}-build-test-v2-${{ hashFiles('apps/frontman_server/mix.lock', 'apps/swarm_ai/mix.lock', 'apps/swarm_ai/lib/**') }}
          restore-keys: ${{ runner.os }}-build-test-v2-

      - name: Install dependencies
        working-directory: apps/frontman_server
        env:
          MIX_OS_DEPS_COMPILE_PARTITION_COUNT: 4
        run: |
          mix deps.clean --unlock --unused
          mix deps.get

      - name: Run tests with coverage
        run: make -C apps/frontman_server test-coverage
        env:
          CLOAK_KEY: "dGVzdC1rZXktZm9yLWNpLXRoaXMtaXMtMzJieXRlc3M="
          MIX_TEST_DB_SUFFIX: "_run_${{ github.run_id }}"

      - name: Coverage report
        uses: clearlyip/code-coverage-report-action@ab9ab6b33423643953c7a8a92d42567fab130fb8 # main (node24)
        with:
          filename: apps/frontman_server/cover/cobertura.xml
          overall_coverage_fail_threshold: 0
          artifact_name: coverage-${{ github.job }}-%name%

      - name: Drop per-run test database
        if: always()
        working-directory: apps/frontman_server
        env:
          MIX_TEST_DB_SUFFIX: "_run_${{ github.run_id }}"
        run: MIX_ENV=test mix ecto.drop --quiet 2>/dev/null || true

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf apps/frontman_server/_build apps/frontman_server/deps

  lint-frontman-server:
    name: Lint frontman-server
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libssl-dev libncurses5-dev

      - name: Fix mise binary permissions
        run: chmod -R +x ~/.local/share/mise/bin/ 2>/dev/null || true

      # Uses mise.toml as single source of truth for Erlang/Elixir versions
      - name: Setup Erlang/Elixir via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Hex/Rebar
        run: make setup-elixir-tools

      - name: Cache deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      # v2: bust stale caches after E2E cache key split (build-e2e- vs build-dev-)
      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/_build
          key: ${{ runner.os }}-build-dev-v2-${{ hashFiles('apps/frontman_server/mix.lock', 'apps/swarm_ai/mix.lock', 'apps/swarm_ai/lib/**') }}
          restore-keys: ${{ runner.os }}-build-dev-v2-

      - name: Install dependencies
        working-directory: apps/frontman_server
        run: |
          mix deps.clean --unlock --unused
          mix deps.get

      - name: Run lint
        run: make -C apps/frontman_server lint

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf apps/frontman_server/_build apps/frontman_server/deps

  dialyzer-frontman-server:
    name: Dialyzer frontman-server
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libssl-dev libncurses5-dev

      - name: Fix mise binary permissions
        run: chmod -R +x ~/.local/share/mise/bin/ 2>/dev/null || true

      # Uses mise.toml as single source of truth for Erlang/Elixir versions
      - name: Setup Erlang/Elixir via mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Hex/Rebar
        run: make setup-elixir-tools

      - name: Cache deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/frontman_server/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      # v2: bust stale caches after E2E cache key split (build-e2e- vs build-dev-)
      - name: Cache _build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/_build
          key: ${{ runner.os }}-build-dev-v2-${{ hashFiles('apps/frontman_server/mix.lock', 'apps/swarm_ai/mix.lock', 'apps/swarm_ai/lib/**') }}
          restore-keys: ${{ runner.os }}-build-dev-v2-

      # PLT cache includes mise.toml hash to invalidate when Erlang/Elixir versions change
      # v3: bust cache after migrating to self-hosted runners (different mise install path)
      # v4: include swarm_ai source hash — path dep changes don't bump mix.lock
      # v5: force rebuild after new SwarmAi.ToolExecution.* modules — stale PLT misses new path dep modules
      - name: Cache PLT
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/frontman_server/priv/plts
          key: ${{ runner.os }}-plt-v5-${{ hashFiles('mise.toml', 'apps/frontman_server/mix.lock', 'apps/swarm_ai/lib/**') }}
          restore-keys: ${{ runner.os }}-plt-v5-

      - name: Install dependencies
        working-directory: apps/frontman_server
        run: |
          mix deps.clean --unlock --unused
          mix deps.get

      - name: Run Dialyzer
        run: make -C apps/frontman_server dialyzer

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf apps/frontman_server/_build apps/frontman_server/deps
