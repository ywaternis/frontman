name: Mirror to GitLab

on:
  push:
    branches:
      - main
    tags:
      - "*"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: mirror-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          GITLAB_SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$GITLAB_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

      - name: Mirror branches and tags
        env:
          GITLAB_REPOSITORY: ${{ vars.GITLAB_REPOSITORY }}
        run: |
          set -euo pipefail
          git clone --mirror "https://github.com/${{ github.repository }}.git" repo.git
          cd repo.git
          git remote add gitlab "git@gitlab.com:${GITLAB_REPOSITORY}.git"
          git push --prune gitlab \
            "+refs/heads/*:refs/heads/*" \
            "+refs/tags/*:refs/tags/*"
