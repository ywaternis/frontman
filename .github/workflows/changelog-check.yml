name: Changelog Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  changelog:
    name: Require changelog entry
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate changesets
        run: yarn changeset status --since=origin/main

      - name: Check changesets cover all changed packages
        run: |
          set -eo pipefail

          CHANGED=$(git diff --name-only origin/main...HEAD)

          # ── Collect changeset-ignored packages from .changeset/config.json ──
          IGNORED_PKGS=$(jq -r '.ignore // [] | .[]' .changeset/config.json)

          # ── Build workspace map: directory -> package name ──
          # Skip private packages, the root workspace, and changeset-ignored packages
          declare -A DIR_TO_PKG
          while IFS= read -r line; do
            loc=$(echo "$line" | jq -r '.location')
            name=$(echo "$line" | jq -r '.name')

            # Skip root workspace
            if [ "$loc" = "." ]; then continue; fi

            # Skip private packages
            is_private=$(jq -r '.private // false' "$loc/package.json" 2>/dev/null)
            if [ "$is_private" = "true" ]; then continue; fi

            # Skip changeset-ignored packages
            skip=false
            for ignored in $IGNORED_PKGS; do
              if [ "$name" = "$ignored" ]; then skip=true; break; fi
            done
            if [ "$skip" = "true" ]; then continue; fi

            DIR_TO_PKG["$loc"]="$name"
          done < <(yarn workspaces list --json 2>/dev/null)

          # ── Determine which publishable packages have file changes ──
          declare -A CHANGED_PKGS
          while IFS= read -r file; do
            for dir in "${!DIR_TO_PKG[@]}"; do
              if [[ "$file" == "$dir/"* ]]; then
                pkg="${DIR_TO_PKG[$dir]}"
                CHANGED_PKGS["$pkg"]=1
                break
              fi
            done
          done <<< "$CHANGED"

          # If no publishable packages changed, nothing to check
          if [ ${#CHANGED_PKGS[@]} -eq 0 ]; then
            echo "No publishable packages changed — skipping changelog check"
            exit 0
          fi

          echo "Publishable packages with changes:"
          for pkg in "${!CHANGED_PKGS[@]}"; do
            echo "  - $pkg"
          done

          # ── Parse changeset files to find which packages are covered ──
          declare -A COVERED_PKGS

          # Check for new changeset .md files (not config.json, not README.md)
          CHANGESET_FILES=$(echo "$CHANGED" | grep '^\.changeset/.*\.md$' | grep -v 'README.md' || true)

          for cs_file in $CHANGESET_FILES; do
            if [ ! -f "$cs_file" ]; then continue; fi
            # Extract package names from YAML frontmatter (lines between --- delimiters)
            in_frontmatter=false
            while IFS= read -r line; do
              if [ "$line" = "---" ]; then
                if [ "$in_frontmatter" = "true" ]; then break; fi
                in_frontmatter=true
                continue
              fi
              if [ "$in_frontmatter" = "true" ]; then
                # Lines look like: "@frontman-ai/nextjs": patch
                pkg_name=$(echo "$line" | sed -n 's/^[[:space:]]*"\?\([^"]*\)"\?[[:space:]]*:.*/\1/p')
                if [ -n "$pkg_name" ]; then
                  COVERED_PKGS["$pkg_name"]=1
                fi
              fi
            done < "$cs_file"
          done

          # Also accept per-package CHANGELOG.md edits as coverage
          # (Root CHANGELOG.md is not counted — it is updated by the release
          # process and does not imply individual packages were reviewed.)
          while IFS= read -r file; do
            if [[ "$file" == *CHANGELOG.md ]]; then
              dir=$(dirname "$file")
              if [ "$dir" = "." ]; then continue; fi
              if [ -n "${DIR_TO_PKG[$dir]+x}" ]; then
                COVERED_PKGS["${DIR_TO_PKG[$dir]}"]=1
              fi
            fi
          done <<< "$CHANGED"

          # ── Compare: fail if any changed package is not covered ──
          MISSING=()
          for pkg in "${!CHANGED_PKGS[@]}"; do
            if [ -z "${COVERED_PKGS[$pkg]+x}" ]; then
              MISSING+=("$pkg")
            fi
          done

          if [ ${#MISSING[@]} -eq 0 ]; then
            echo "All changed packages are covered by changesets"
            exit 0
          fi

          echo ""
          echo "::error::The following packages have changes but are not listed in any changeset:"
          for pkg in "${MISSING[@]}"; do
            echo "::error::  - $pkg"
          done
          echo ""
          echo "Run 'yarn changeset' and include these packages, or add the 'skip-changelog' label."
          exit 1
