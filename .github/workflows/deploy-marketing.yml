name: Deploy Marketing

on:
  push:
    branches:
      - main
    paths:
      - 'apps/marketing/**'
      - 'libs/frontman-astro/**'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Deploy to Production
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ReScript packages
        run: pnpm exec rescript

      - name: Bundle astro integration
        run: pnpm run build:bundle
        working-directory: libs/frontman-astro

      - name: Build marketing site
        run: cd apps/marketing && pnpm run build

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          workingDirectory: apps/marketing
          command: pages deploy dist --project-name=frontman-marketing --branch=main

      - name: Submit to IndexNow
        if: success()
        continue-on-error: true
        run: node apps/marketing/scripts/indexnow.mjs

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          component: Marketing
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
