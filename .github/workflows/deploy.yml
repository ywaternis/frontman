name: Deploy Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontman_server/**'
      - 'apps/swarm_ai/**'
      - 'libs/**'
      - 'rescript.json'
      - 'mise.toml'
      - '.github/workflows/deploy.yml'
      - 'infra/**'
      - '!infra/production/notifier/**'
  workflow_dispatch:

# Only one deploy at a time — newer pushes cancel in-progress deploys
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Server: rsync source → build natively on prod server → blue-green deploy
  # ==========================================================================
  deploy-server:
    name: Deploy Server
    runs-on: self-hosted
    environment: production
    env:
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PROD_SERVER" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to production server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '_build' \
            --exclude 'deps' \
            --exclude '.worktrees' \
            --exclude '.DS_Store' \
            --exclude '.yarn' \
            --exclude '.env.local' \
            --exclude '.certs' \
            --exclude 'docs' \
            --exclude 'infra/marketing' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            "deploy@${PROD_SERVER}:/opt/frontman/build/"

      - name: Copy deploy script
        run: |
          scp -i ~/.ssh/deploy_key \
            infra/production/build-and-deploy.sh \
            "deploy@${PROD_SERVER}:/opt/frontman/build-and-deploy.sh"
          ssh -i ~/.ssh/deploy_key "deploy@${PROD_SERVER}" \
            'chmod +x /opt/frontman/build-and-deploy.sh'

      - name: Build and deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "deploy@${PROD_SERVER}" \
            '/opt/frontman/build-and-deploy.sh'

      - name: Sync monitoring configs and reload
        run: |
          ssh -i ~/.ssh/deploy_key "deploy@${PROD_SERVER}" bash -s <<'EOF'
          # Only sync if monitoring is installed (setup-monitoring.sh has been run)
          if [ -f /usr/local/bin/prometheus ]; then
            BUILD_MON="/opt/frontman/build/infra/production/monitoring"
            if [ -d "${BUILD_MON}" ]; then
              echo "Syncing monitoring configs..."
              sudo cp "${BUILD_MON}/prometheus.yml" /etc/prometheus/prometheus.yml
              sudo cp "${BUILD_MON}/alert-rules.yml" /etc/prometheus/alert-rules.yml
              sudo cp "${BUILD_MON}/blackbox.yml" /etc/prometheus/blackbox.yml
              sudo cp "${BUILD_MON}/alertmanager.yml" /etc/alertmanager/alertmanager.yml
              sudo chown -R prometheus:prometheus /etc/prometheus
              sudo chown -R alertmanager:alertmanager /etc/alertmanager

              echo "Reloading Prometheus..."
              curl -sf -X POST http://127.0.0.1:9090/-/reload || echo "  Warning: Prometheus reload failed"
              echo "Reloading Alertmanager..."
              curl -sf -X POST http://127.0.0.1:9093/-/reload || echo "  Warning: Alertmanager reload failed"
              echo "Monitoring configs synced and reloaded."
            fi
          else
            echo "Monitoring not installed — skipping config sync."
          fi
          EOF

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          component: Server
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}

  # ==========================================================================
  # Client: build standalone bundle on CI → deploy to Cloudflare Pages
  # Runs after server to avoid OOM on shared self-hosted runner
  # ==========================================================================
  deploy-client:
    name: Deploy Client
    needs: deploy-server
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.4.1'

      - name: Enable Corepack
        run: corepack enable && corepack install

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.yarn/berry/cache
          key: yarn-berry-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-berry-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build ReScript
        run: yarn rescript clean && yarn rescript build

      - name: Build client standalone bundle
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          cd libs/client
          yarn vite build --config vite.config.standalone.ts
          echo "Client bundle built:"
          ls -lh dist/

      - name: Deploy client to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy libs/client/dist --project-name=frontman-client --branch=main

      - name: Notify Discord
        if: always()
        continue-on-error: true
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          component: Client
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
