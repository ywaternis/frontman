procs:
  rescript:
    cmd: ["bash", "-c", "rm -f lib/bs/.compiler.log && make clean && make rescript-build && make rescript-watch"]

  server:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting server...' && make dev-server"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  client:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting client...' && make dev-client"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  nextjs-bundle:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting tsup watch...' && cd libs/frontman-nextjs && pnpm exec tsup --watch"]

  astro-bundle:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting tsup watch...' && cd libs/frontman-astro && pnpm exec tsup --watch"]

  nextjs:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for nextjs bundle...' && while [ ! -f libs/frontman-nextjs/dist/index.js ]; do sleep 1; done && echo 'Bundle ready, starting Next.js...' && make dev-nextjs"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  marketing:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for astro bundle...' && while [ ! -f libs/frontman-astro/dist/integration.js ]; do sleep 1; done && echo 'Bundle ready. Waiting for server...' && while ! (: > /dev/tcp/localhost/4000) 2>/dev/null; do sleep 1; done && echo 'Server ready, starting marketing...' && make dev-marketing"]
    env:
      FRONTMAN_CLIENT_URL: "http://localhost:5173/src/Main.res.mjs"
      FRONTMAN_HOST: "frontman.local:4000"

  wordpress:
    cmd: ["php", "-S", "localhost:8080", "-t", "/Users/itay/code/wordpress"]
