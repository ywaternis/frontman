# mprocs config for containerized worktrees.
#
# Differences from mprocs.yml:
# - No postgres process (runs as a sibling container in the pod)
# - Server waits on pg_isready -h localhost (pod-local postgres)
# - Server uses make dev-container (secrets pre-resolved via env vars)
# - FRONTMAN_CLIENT_URL and FRONTMAN_HOST are derived from $WORKTREE_HASH
#   so the browser connects through Caddy (not localhost)
procs:
  rescript:
    cmd: ["bash", "-c", "rm -f lib/bs/.compiler.log && make clean && make rescript-build && make rescript-watch"]

  server:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for Postgres...' && while ! pg_isready -h localhost -U postgres 2>/dev/null; do sleep 2; done && echo 'Postgres ready, starting server...' && export PHX_HOST=${WORKTREE_HASH}.api.frontman.local && export PHX_URL_PORT=443 && cd apps/frontman_server && make dev-container"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  client:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting client...' && make dev-client"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  nextjs-bundle:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting tsup watch...' && cd libs/frontman-nextjs && pnpm exec tsup --watch"]

  astro-bundle:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready, starting tsup watch...' && cd libs/frontman-astro && pnpm exec tsup --watch"]

  nextjs:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for nextjs bundle...' && while [ ! -f libs/frontman-nextjs/dist/index.js ]; do sleep 1; done && echo 'Bundle ready, starting Next.js...' && export FRONTMAN_CLIENT_URL=https://${WORKTREE_HASH}.vite.frontman.local/src/Main.res.mjs && export FRONTMAN_HOST=${WORKTREE_HASH}.api.frontman.local && make dev-nextjs"]
    env:
      FRONTMAN_INTERNAL_DEV: "true"

  marketing:
    cmd: ["bash", "-c", "echo 'Waiting for ReScript compiler...' && while [ ! -f lib/bs/.compiler.log ] || ! tail -1 lib/bs/.compiler.log 2>/dev/null | grep -q '^#Done'; do sleep 1; done && echo 'ReScript ready. Waiting for astro bundle...' && while [ ! -f libs/frontman-astro/dist/integration.js ]; do sleep 1; done && echo 'Bundle ready. Waiting for server...' && while ! (: > /dev/tcp/localhost/4000) 2>/dev/null; do sleep 1; done && echo 'Server ready, starting marketing...' && export FRONTMAN_CLIENT_URL=https://${WORKTREE_HASH}.vite.frontman.local/src/Main.res.mjs && export FRONTMAN_HOST=${WORKTREE_HASH}.api.frontman.local && cd apps/marketing && pnpm run dev --host 0.0.0.0"]
